  name: Update Package

  on:
    workflow_dispatch:
      inputs:
        app:
          description: 'App name (manifest filename without .json)'
          required: true
        version:
          description: 'New version'
          required: true

  jobs:
    update:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v4

        - name: Update manifest version
          run: |
            APP="${{ github.event.inputs.app }}"
            VERSION="${{ github.event.inputs.version }}"
            MANIFEST="bucket/${APP}.json"

            if [ ! -f "$MANIFEST" ]; then
              echo "❌ Manifest not found: $MANIFEST"
              exit 1
            fi

            jq --arg v "$VERSION" '.version = $v' "$MANIFEST" > tmp.json
            mv tmp.json "$MANIFEST"
            echo "✅ Updated $APP to v$VERSION"
            cat "$MANIFEST"

        - name: Commit and push
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bucket/
            git diff --staged --quiet && echo "No changes" && exit 0
            git commit -m "chore: update ${{ github.event.inputs.app }} to v${{ github.event.inputs.version }}"
            git push