  name: Update Package

  on:
    workflow_dispatch:
      inputs:
        app:
          description: 'App name (manifest filename without .json)'
          required: true
        version:
          description: 'New version'
          required: true

  jobs:
    update:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v5

        - name: Update manifest version
          run: |
            APP="${{ github.event.inputs.app }}"
            VERSION="${{ github.event.inputs.version }}"
            mapfile -t MATCHES < <(find bucket -type f -name "${APP}.json" | sort)

            if [ "${#MATCHES[@]}" -eq 0 ]; then
              echo "❌ 未找到清单: ${APP}.json"
              echo "当前 bucket 中可用的清单:"
              find bucket -type f -name '*.json' -printf ' - %P\n' | sort
              exit 1
            fi

            if [ "${#MATCHES[@]}" -gt 1 ]; then
              echo "❌ 找到多个同名清单，请先消除歧义:"
              printf ' - %s\n' "${MATCHES[@]}"
              exit 1
            fi

            MANIFEST="${MATCHES[0]}"
            TMP_FILE="$(mktemp)"

            jq --arg v "$VERSION" '.version = $v' "$MANIFEST" > "$TMP_FILE"
            mv "$TMP_FILE" "$MANIFEST"
            echo "✅ 已更新 $APP 到 v$VERSION"
            echo "目标清单: $MANIFEST"
            cat "$MANIFEST"

        - name: Commit and push
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bucket/
            git diff --staged --quiet && echo "No changes" && exit 0
            git commit -m "chore: 更新 ${{ github.event.inputs.app }} 清单版本到 v${{ github.event.inputs.version }}"
            git push
